<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Test Slider</title>
  <style>
    body { margin:0; font-family:Arial, sans-serif; background:#020617; color:#fff; }
    .slider-section { padding:40px 0; }
    .slider { position:relative; max-width:900px; margin:0 auto; overflow:hidden; border-radius:16px; }
    .slide { position:absolute; inset:0; opacity:0; transition:opacity 0.7s ease; display:flex; align-items:center; }
    .slide.active { opacity:1; }
    .slide-bg { position:absolute; inset:0; background-size:cover; background-position:center; filter:brightness(0.5); }
    .slide-1 { background-image:url("https://images.pexels.com/photos/4421507/pexels-photo-4421507.jpeg?auto=compress&cs=tinysrgb&w=1200"); }
    .slide-2 { background-image:url("https://images.pexels.com/photos/5380642/pexels-photo-5380642.jpeg?auto=compress&cs=tinysrgb&w=1200"); }
    .slide-3 { background-image:url("https://images.pexels.com/photos/1181263/pexels-photo-1181263.jpeg?auto=compress&cs=tinysrgb&w=1200"); }
    .slide-content { position:relative; padding:40px; z-index:1; }
    .slider-indicators { position:absolute; bottom:12px; left:50%; transform:translateX(-50%); display:flex; gap:6px; }
    .indicator { width:10px; height:10px; border-radius:999px; border:none; background:#64748b; cursor:pointer; }
    .indicator.active { width:26px; background:#f97316; }
  </style>
</head>
<body>
  <section class="slider-section">
    <div class="slider">
      <div class="slide active">
        <div class="slide-bg slide-1"></div>
        <div class="slide-content">
          <h2>Networking Infrastructure</h2>
          <p>High‑performance LAN, WAN and wireless networks.</p>
        </div>
      </div>
      <div class="slide">
        <div class="slide-bg slide-2"></div>
        <div class="slide-content">
          <h2>Cyber Security</h2>
          <p>Advanced firewalls and endpoint protection.</p>
        </div>
      </div>
      <div class="slide">
        <div class="slide-bg slide-3"></div>
        <div class="slide-content">
          <h2>IT Technical Support</h2>
          <p>Fast remote and on‑site troubleshooting.</p>
        </div>
      </div>

      <div class="slider-indicators">
        <button class="indicator active"></button>
        <button class="indicator"></button>
        <button class="indicator"></button>
      </div>
    </div>
  </section>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const slides = document.querySelectorAll(".slide");
      const dots = document.querySelectorAll(".indicator");
      if (!slides.length) return;

      let current = 0;
      let timer;

      function showSlide(i) {
        slides.forEach((s, idx) => s.classList.toggle("active", idx === i));
        dots.forEach((d, idx) => d.classList.toggle("active", idx === i));
        current = i;
      }

      function start() {
        clearInterval(timer);
        timer = setInterval(() => {
          const next = (current + 1) % slides.length;
          showSlide(next);
        }, 4000);
      }

      dots.forEach((dot, i) => {
        dot.addEventListener("click", () => {
          showSlide(i);
          start();
        });
      });

      showSlide(0);
      start();
    });
  </script>
</body>
</html>
